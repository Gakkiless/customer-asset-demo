<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>松赞 · 客户资产看板 Demo</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{--bg:#0c0e14;--card:#151821;--card2:#1b1f2c;--border:#252a3a;--text:#e4e6eb;--text2:#8b92a5;--text3:#5c6378;--gold:#c8956c;--gold2:#e8b88a;--gold-bg:rgba(200,149,108,.12);--red:#f04444;--red-bg:rgba(240,68,68,.1);--green:#2dd4a0;--green-bg:rgba(45,212,160,.1);--amber:#f5b731;--amber-bg:rgba(245,183,49,.1);--blue:#5b9cf6;--purple:#a78bfa;--pink:#f472b6;--orange:#fb923c;--ice:#93c5fd;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.hdr{background:linear-gradient(135deg,#151821,#1e2335);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.hdr h1{font-size:17px;font-weight:600}.hdr h1 span{color:var(--text2);font-weight:400;font-size:12px;margin-left:8px}
.bc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}.bc a{color:var(--gold);cursor:pointer;text-decoration:none}.bc a:hover{text-decoration:underline}.bc .sep{color:var(--text3);font-size:10px}
.main{padding:18px 24px;max-width:1480px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;transition:.2s}.kpi:hover{border-color:var(--gold);transform:translateY(-1px)}
.kpi-l{font-size:11px;color:var(--text2);margin-bottom:5px}.kpi-v{font-size:22px;font-weight:700}.kpi-s{font-size:10px;margin-top:3px}.kpi-s.up{color:var(--green)}.kpi-s.dn{color:var(--red)}
.sec{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:18px;overflow:hidden}
.sec-h{padding:14px 18px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.sec-t{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}.sec-t::before{content:'';width:3px;height:14px;background:var(--gold);border-radius:2px}
.sec-b{padding:14px 18px}
.rg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.rg-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.rg-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,149,108,.15)}
.rg-card::after{content:'点击查看详情';position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--gold));color:#fff;font-size:10px;text-align:center;padding:6px;border-radius:0 0 var(--r) var(--r);opacity:0;transition:opacity .2s;font-weight:500}
.rg-card:hover::after{opacity:.9}
.rg-name{font-size:16px;font-weight:600;margin-bottom:8px}.rg-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px 10px}.rg-sl{font-size:10px;color:var(--text2)}.rg-sv{font-size:14px;font-weight:600}
.rg-bar{height:4px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:8px;overflow:hidden}.rg-bar-f{height:100%;border-radius:2px;transition:width .6s}
.rg-hint{font-size:11px;color:var(--text3);text-align:center;padding:4px 0 0;border-top:1px dashed var(--border);margin-top:8px}
.new-split{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.ns-item{padding:16px 20px;background:rgba(255,255,255,.02);border-radius:8px;border:1px solid var(--border)}
.ns-name{font-size:12px;color:var(--text2);margin-bottom:8px}
.ns-num{font-size:28px;font-weight:700;color:var(--text)}
.ns-num span{font-size:14px;font-weight:400;color:var(--text2);margin-left:4px}
.ns-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;margin:10px 0 8px;overflow:hidden}
.ns-fill{height:100%;border-radius:3px;transition:width .8s}
.ns-sub{font-size:11px;color:var(--text2)}
.tw{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);font-size:11px;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid rgba(37,42,58,.5);white-space:nowrap}
tr{transition:background .12s}tbody tr:hover td{background:var(--card2)}tr.ck{cursor:pointer}tr.ck:hover td{background:rgba(200,149,108,.05)}
.mbar{display:flex;align-items:center;gap:5px}.mbar-track{width:68px;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}.mbar-fill{height:100%;border-radius:3px;transition:width .4s}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;margin:1px;white-space:nowrap}
.t-nature{background:rgba(45,212,160,.13);color:#2dd4a0}.t-culture{background:rgba(245,183,49,.13);color:#f5b731}.t-luxury{background:rgba(200,149,108,.18);color:#e8b88a}.t-family{background:rgba(91,156,246,.13);color:#5b9cf6}
.t-food{background:rgba(244,114,182,.13);color:#f472b6}.t-hike{background:rgba(167,139,250,.13);color:#a78bfa}.t-photo{background:rgba(251,146,60,.13);color:#fb923c}.t-snow{background:rgba(147,197,253,.13);color:#93c5fd}
.nature{background:rgba(45,212,160,.13);color:#2dd4a0}.culture{background:rgba(245,183,49,.13);color:#f5b731}.luxury{background:rgba(200,149,108,.18);color:#e8b88a}.family{background:rgba(91,156,246,.13);color:#5b9cf6}.food{background:rgba(244,114,182,.13);color:#f472b6}.hike{background:rgba(167,139,250,.13);color:#a78bfa}.photo{background:rgba(251,146,60,.13);color:#fb923c}.snow{background:rgba(147,197,253,.13);color:#93c5fd}
.ctag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.ok-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(45,212,160,.15);color:#2dd4a0}
.rname{font-weight:600}
.total-row td{font-weight:700;background:rgba(255,255,255,.02)}
.nature{background:rgba(45,212,160,.13);color:#2dd4a0}.culture{background:rgba(245,183,49,.13);color:#f5b731}.luxury{background:rgba(200,149,108,.18);color:#e8b88a}.family{background:rgba(91,156,246,.13);color:#5b9cf6}.food{background:rgba(244,114,182,.13);color:#f472b6}.hike{background:rgba(167,139,250,.13);color:#a78bfa}.photo{background:rgba(251,146,60,.13);color:#fb923c}.snow{background:rgba(147,197,253,.13);color:#93c5fd}
.ctag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.fb{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.fb-urg{background:var(--red-bg);color:var(--red)}.fb-spn{background:var(--amber-bg);color:var(--amber)}.fb-ok{background:var(--green-bg);color:var(--green)}
.ch{width:100%;height:320px}.ch-sm{width:100%;height:240px}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.bbtn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;font-size:12px;background:var(--gold-bg);color:var(--gold);border:1px solid rgba(200,149,108,.2);cursor:pointer;transition:.2s}.bbtn:hover{background:rgba(200,149,108,.2)}
.sale-name{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-weight:600;padding:2px 8px;border-radius:4px;transition:all .15s}
.sale-name:hover{color:var(--gold);background:rgba(200,149,108,.08)}
.sale-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.cust-urg td{background:rgba(240,68,68,.04)!important}.cust-soon td{background:rgba(245,183,49,.03)!important}
.lvl{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.lvl-金刚{background:rgba(200,149,108,.25);color:var(--gold2)}.lvl-莲{background:rgba(91,156,246,.15);color:var(--blue)}.lvl-雪莲{background:rgba(45,212,160,.12);color:var(--green)}.lvl-绿绒蒿{background:rgba(167,139,250,.15);color:var(--purple)}.lvl-格桑{background:rgba(92,99,120,.2);color:var(--text3)}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .25s ease}
.urg-panel{background:var(--red-bg);border:1px solid rgba(240,68,68,.2);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.urg-panel .urg-text{font-size:13px;color:var(--red)}.urg-panel .urg-num{font-weight:700;font-size:18px}
.tag-filter{display:flex;gap:5px;flex-wrap:wrap}.tf-btn{padding:3px 9px;border-radius:12px;font-size:11px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:.2s}.tf-btn:hover{border-color:var(--gold);color:var(--text)}.tf-btn.on{background:var(--gold);color:#fff;border-color:var(--gold)}
@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.rg-grid{grid-template-columns:repeat(2,1fr)}.col2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-l"><div class="logo">松</div><h1>客户资产看板<span>Demo · 数据为模拟</span></h1></div><div class="bc" id="bc"><a onclick="goOverview()">全部大区</a></div></div>
<div class="main" id="app"></div>
<script src="demo.js"></script>
</body>
</html>
